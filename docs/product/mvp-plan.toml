# ============================================================================
# ATS FORMATTING RULES — Strict standards our resume generator MUST follow
# ============================================================================

[ats_rules]
description = "Research-backed ATS formatting rules that must be enforced in resume generation"

[ats_rules.file_format]
preferred        = "DOCX (highest parsing success across all ATS)"
acceptable       = "Text-based PDF (not image-based)"
prohibited       = [".pages", ".odt", "Canva PDFs", "image-based PDFs"]

[ats_rules.fonts]
safe_fonts       = ["Calibri", "Arial", "Times New Roman", "Verdana", "Georgia", "Helvetica"]
prohibited_fonts = ["Comic Sans", "Courier", "custom fonts", "script fonts"]
body_size_pt     = "10-12"
header_size_pt   = "14-16"
name_size_pt     = "18-22"

[ats_rules.layout]
structure           = "Single-column (safest; simple 2-column acceptable in modern ATS)"
margins_inches      = "0.75 to 1.0 (never below 0.5)"
line_spacing         = "1.0 to 1.15"
text_alignment       = "Left-aligned (center only for name/contact)"
bullet_symbols       = ["•", "–"]
prohibited_elements  = [
    "Tables for layout (data tables OK for skills)",
    "Text boxes",
    "Graphics / logos / icons",
    "Skill bars / progress bars / charts",
    "Headers and footers (for critical info)",
    "Multi-column layouts via text boxes",
    "Photos / headshots",
    "Special symbols (☑, ➤, ★)",
]

[ats_rules.section_headers]
required_names = [
    "Summary | Profile | Professional Summary",
    "Work Experience | Professional Experience | Experience",
    "Education | Academic Background",
    "Skills | Technical Skills | Core Competencies",
    "Certifications",
    "Projects | Academic Projects | Personal Projects",
]
prohibited_names = [
    "My Story", "Bio", "Where I've Been", "Gigs",
    "Alma Mater", "Learning", "Toolbox", "What I Know",
]

[ats_rules.dates]
safe_formats   = ["MM/YYYY", "Month YYYY", "MMM YYYY"]
dangerous      = ["'23–Present", "Summer 2023", "Ongoing", "just years (2022-2023)"]
current_job    = "Use 'Present' or 'Current'"
placement      = "Right-aligned, separate from job title"

[ats_rules.keywords]
density_target         = "2-3% of total word count (10-15 instances in 500-word resume)"
placement_priority     = "Summary > Skills > Recent Experience > Earlier Experience"
include_both_forms     = "Always include acronym AND full term (e.g., 'AWS (Amazon Web Services)')"
exact_match_priority   = "ATS still prioritizes exact matches over semantic"
context_matters        = "Keywords in context score higher than keyword lists"
natural_weaving        = "Keywords should be invisible — woven into achievements"

[ats_rules.page_count]
entry_level    = "1 page (0-5 years experience)"
mid_level      = "1-2 pages (5-10 years)"
senior_level   = "2 pages (10+ years; 2.9x callback boost)"
executive      = "2-3 pages"
academic_cv    = "No limit"
federal        = "2-5 pages"

[ats_rules.bullets]
entry_per_role     = "3-5 bullets"
mid_per_role       = "5-7 bullets"
senior_per_role    = "5-8 bullets (recent roles more, older roles fewer)"
formula            = "XYZ: 'Accomplished [X] as measured by [Y], by doing [Z]'"
alt_formula        = "CAR: Challenge → Action → Result"
max_length_chars   = "150-200 characters per bullet"
start_with         = "Strong action verb (Architected, Spearheaded, Delivered, etc.)"
never_start_with   = ["Responsible for", "Helped", "Assisted", "Worked on", "Participated in", "Utilized"]
quantification     = "Required where possible; if no metrics, describe scope/complexity"

# ============================================================================
# COVER LETTER RULES — New feature requirements
# ============================================================================

[cover_letter_rules]
read_rate           = "83% of hiring managers read cover letters"
ideal_length_words  = "150-300"
max_pages           = 1
structure           = ["Hook (why THIS company + role)", "Value (achievement mapped to their need)", "Fit (culture/mission alignment)", "Close (call to action)"]
format              = "Problem-Solution format outperforms all others"
personalization     = "Must reference specific company details, not generic"
ai_detection_risk   = "Growing; ensure output has specificity, not generic polish"

