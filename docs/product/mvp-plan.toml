Growing trend: employers using AI detection on application materials.
Ensure our AI-generated content passes authenticity checks:
- Add specificity scoring (vague language = AI flag)
- Inject candidate-specific details (company names, project names, team sizes)
- Vary sentence structure and length (AI tends to be uniform)
- Avoid overused AI phrases ('leverage', 'synergy', 'cutting-edge', 'spearheaded')
- Add a 'human voice' pass that introduces natural variation
- Score output on AI detection likelihood before presenting to user
- Temperature variations per section to increase naturalness
"""
files       = [
    "src/core/resume/authenticity-guard.ts",
    "src/background/message-handler.ts",
]
priority    = "p2-medium"
status      = "done"

