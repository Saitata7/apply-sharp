# ============================================================================
# QUALITY STANDARDS — Applied to all phases
# ============================================================================

[quality]
description = "Standards that apply across ALL development work"

[quality.resume_output]
must_pass_ats       = "Every generated resume must pass our own ATS format validator"
must_be_human       = "AI-enhanced content must pass authenticity checks"
must_preserve_truth = "NEVER fabricate metrics, titles, or experiences"
must_target_pages   = "Must hit target page count for experience level"

[quality.code]
typescript_strict   = true
no_any_types        = "Minimize use of 'any' type"
error_handling      = "All async operations must have try/catch with meaningful fallbacks"
loading_states      = "All async UI operations must show loading indicators"
module_prefix       = "All console.log/error must use [ModuleName] prefix"

[quality.ai_prompts]
temperature_ladder  = "Analysis(0.3) → Enhancement(0.5) → Creative(0.65)"
always_fallback     = "Every AI call must have a non-AI fallback path"
json_safety         = "Always use extractJSONFromResponse() for AI output parsing"
rate_limit_aware    = "15s delay between calls for Groq; respect provider limits"
